name: Update Kodi Repository

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build C++ visualizer (macOS)
        run: bash visualization.ibroadcast.albumart/build.sh

      - name: Build C++ visualizer (Android arm64-v8a)
        continue-on-error: true
        run: |
          NDK="${ANDROID_NDK_ROOT:-$ANDROID_NDK_HOME}"
          ADDON=visualization.ibroadcast.albumart
          cmake -S "$ADDON" -B "$ADDON/build_android" \
                -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-21 \
                -DCMAKE_BUILD_TYPE=Release \
                -DKODI_INCLUDE_DIR=/tmp/xbmc-omega/xbmc/addons/kodi-dev-kit/include
          cmake --build "$ADDON/build_android"
          cp "$ADDON/build_android/$ADDON.so" "$ADDON/"

      - name: Build addon zips and generate addons.xml
        run: python3 .github/scripts/build_repo.py

      - name: Commit and push updated repo files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add addons.xml addons.xml.md5 index.html
          git add '*/index.html' '*/plugin.*.zip' '*/visualization.*.zip' 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update repository [skip ci]"
          git push
